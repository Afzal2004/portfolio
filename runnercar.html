<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NEON DRIFT — Highway Racer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e27;
    --bg-mid:#160f3d;
    --bg-mid2:#1f1354;
    --accent-pink:#ff2e97;
    --accent-cyan:#00e5ff;
    --accent-yellow:#ffcc00;
    --accent-green:#39ff88;
    --accent-red:#ff3b3b;
    --road:#14152b;
    --road-line:#2a2c52;
    --text-light:#eef0ff;
    --text-dim:#8d90c4;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg-deep);
    color:var(--text-light);
    font-family:'Rajdhani',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  h1,h2,h3,.mono,.hud-value,.btn,.plate{font-family:'Orbitron',sans-serif;}

  #app{
    position:relative;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 50% -10%, #3a1a6b 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-mid2) 100%);
  }

  /* ---------- shared screen wrapper ---------- */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    transition:opacity .35s ease;
  }
  .hidden{ display:none !important; }

  /* ---------- synthwave horizon (menu backdrop) ---------- */
  .horizon{
    position:absolute; inset:0; overflow:hidden; z-index:0;
    pointer-events:none;
  }
  .sun{
    position:absolute; left:50%; top:20%;
    width:260px; height:260px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(180deg, var(--accent-yellow) 0%, var(--accent-pink) 55%, var(--accent-cyan) 100%);
    box-shadow:0 0 90px 10px rgba(255,60,150,.45);
    -webkit-mask-image:repeating-linear-gradient(0deg, black 0 4px, transparent 4px 8px);
            mask-image:repeating-linear-gradient(0deg, black 0 4px, transparent 4px 8px);
    animation:sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse{0%,100%{box-shadow:0 0 90px 10px rgba(255,60,150,.45)}50%{box-shadow:0 0 130px 26px rgba(0,229,255,.4)}}
  .grid-floor{
    position:absolute; left:0; right:0; bottom:0; height:52%;
    background-image:
      linear-gradient(var(--accent-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--accent-pink) 1px, transparent 1px);
    background-size:60px 60px;
    opacity:.35;
    transform:perspective(300px) rotateX(60deg);
    transform-origin:bottom;
    animation:gridMove 1.4s linear infinite;
  }
  @keyframes gridMove{ from{background-position-y:0} to{background-position-y:60px} }
  .scanline-glow{
    position:absolute; left:0; right:0; bottom:48%; height:2px;
    background:var(--accent-cyan); opacity:.6; filter:blur(1px);
    box-shadow:0 0 20px 4px var(--accent-cyan);
  }

  /* ---------- title ---------- */
  .title-wrap{ position:relative; z-index:2; text-align:center; margin-bottom:8px; }
  .brand{
    font-size:clamp(2.4rem,7vw,4.2rem); font-weight:900; letter-spacing:6px; margin:0;
    background:linear-gradient(180deg,#fff 0%, var(--accent-cyan) 55%, var(--accent-pink) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(0,229,255,.35);
  }
  .brand-sub{
    margin:2px 0 0; font-size:.85rem; letter-spacing:8px; color:var(--text-dim); font-weight:600;
  }

  /* ---------- car select ---------- */
  .select-panel{
    position:relative; z-index:2;
    background:rgba(10,10,30,.55);
    border:1px solid rgba(0,229,255,.25);
    border-radius:18px;
    padding:22px 26px 26px;
    backdrop-filter:blur(10px);
    width:min(520px,92vw);
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .panel-label{
    font-size:.72rem; letter-spacing:4px; color:var(--accent-cyan); font-weight:700; margin:0 0 10px;
    text-align:center;
  }
  #previewCanvas{
    display:block; margin:0 auto 14px; background:radial-gradient(ellipse at center, rgba(0,229,255,.08), transparent 70%);
    border-radius:12px;
  }
  .swatch-row{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:18px;
  }
  .swatch{
    width:42px; height:42px; border-radius:50%; cursor:pointer;
    border:3px solid transparent; position:relative;
    box-shadow:inset 0 -4px 8px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.4);
    transition:transform .15s ease, border-color .15s ease;
  }
  .swatch:hover{ transform:translateY(-3px) scale(1.06); }
  .swatch.active{ border-color:#fff; box-shadow:0 0 0 4px rgba(255,255,255,.15), 0 0 18px currentColor; }
  .car-name{
    text-align:center; font-weight:700; letter-spacing:2px; color:var(--text-light);
    font-size:1rem; margin-bottom:18px; height:1.3em;
  }

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-weight:700; letter-spacing:2px; font-size:.95rem;
    padding:14px 22px; border-radius:10px;
    color:#04121a;
    background:linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
    box-shadow:0 6px 0 rgba(0,0,0,.35), 0 0 24px rgba(0,229,255,.35);
    transition:transform .1s ease, box-shadow .1s ease;
    width:100%;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.35); }
  .btn.secondary{
    background:linear-gradient(135deg,#3a3f6b,#232748);
    color:var(--text-light);
    box-shadow:0 6px 0 rgba(0,0,0,.35);
  }
  .btn.pink{ background:linear-gradient(135deg, var(--accent-pink), #ff7ab8); }
  .btn.small{ width:auto; padding:10px 16px; font-size:.8rem; }

  .hint{
    text-align:center; margin-top:14px; color:var(--text-dim); font-size:.8rem; letter-spacing:1px;
  }

  /* ---------- GAME SCREEN ---------- */
  #gameScreen{ padding:0; }
  #gameStage{
    position:relative;
    width:min(480px, 100vw);
    height:100vh;
    max-height:900px;
    box-shadow:0 0 0 2px rgba(0,229,255,.25), 0 0 60px rgba(0,0,0,.6);
    overflow:hidden;
  }
  #gameCanvas{ display:block; width:100%; height:100%; background:var(--road); }

  .hud{
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 14px 0;
    pointer-events:none;
  }
  .hud-block{
    background:rgba(8,8,24,.55); border:1px solid rgba(0,229,255,.25);
    border-radius:10px; padding:8px 14px; backdrop-filter:blur(6px);
    min-width:86px;
  }
  .hud-label{ font-size:.6rem; letter-spacing:2px; color:var(--text-dim); font-weight:700; }
  .hud-value{ font-size:1.3rem; font-weight:700; color:var(--accent-cyan); line-height:1.1; }
  .hud-value.speed{ color:var(--accent-yellow); }
  .lives{ display:flex; gap:4px; margin-top:2px; }
  .life-dot{ width:14px; height:14px; border-radius:50%; background:var(--accent-red); box-shadow:0 0 8px var(--accent-red); }
  .life-dot.lost{ background:#2a2c4a; box-shadow:none; }

  .controls-top{
    position:absolute; top:14px; right:14px; z-index:6; display:flex; gap:8px; pointer-events:auto;
  }
  .icon-btn{
    width:40px; height:40px; border-radius:8px; border:1px solid rgba(0,229,255,.35);
    background:rgba(8,8,24,.6); color:var(--text-light); cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px);
  }
  .icon-btn:active{ transform:scale(.93); }

  .touch-controls{
    position:absolute; bottom:22px; left:0; right:0; z-index:6;
    display:flex; justify-content:space-between; padding:0 22px; pointer-events:none;
  }
  .touch-btn{
    pointer-events:auto;
    width:68px; height:68px; border-radius:50%;
    background:rgba(0,229,255,.12); border:1.5px solid rgba(0,229,255,.4);
    color:var(--accent-cyan); font-size:1.6rem; font-weight:900;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .touch-btn:active{ background:rgba(0,229,255,.3); transform:scale(.95); }

  .center-overlay{
    position:absolute; inset:0; z-index:8;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(6,6,20,.72); backdrop-filter:blur(4px);
    text-align:center; padding:20px;
  }
  .overlay-title{ font-size:2rem; font-weight:900; letter-spacing:4px; margin:0 0 6px; }
  .overlay-title.go{ color:var(--accent-red); text-shadow:0 0 24px rgba(255,59,59,.6);}
  .overlay-title.pause{ color:var(--accent-cyan); text-shadow:0 0 24px rgba(0,229,255,.6);}
  .overlay-sub{ color:var(--text-dim); font-size:.95rem; margin-bottom:22px; letter-spacing:1px; }
  .overlay-score{ font-size:1.1rem; margin-bottom:4px; }
  .overlay-score b{ color:var(--accent-yellow); font-size:1.4rem; }
  .overlay-buttons{ display:flex; gap:10px; margin-top:18px; width:220px; flex-direction:column; }

  .toast-combo{
    position:absolute; z-index:7; pointer-events:none;
    font-weight:900; font-size:1.1rem; color:var(--accent-yellow);
    text-shadow:0 0 10px rgba(255,204,0,.7);
    animation:floatUp .7s ease-out forwards;
  }
  @keyframes floatUp{ from{opacity:1; transform:translateY(0)} to{opacity:0; transform:translateY(-40px)} }

  @media (max-width:420px){
    .select-panel{ padding:18px 16px 20px; }
    .touch-btn{ width:58px; height:58px; }
  }
  @media (prefers-reduced-motion: reduce){
    .sun,.grid-floor{ animation:none; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ MENU / CAR SELECT ============ -->
  <div id="menuScreen" class="screen">
    <div class="horizon">
      <div class="sun"></div>
      <div class="scanline-glow"></div>
      <div class="grid-floor"></div>
    </div>

    <div class="title-wrap">
      <h1 class="brand">RUNNER CAR</h1>
      <p class="brand-sub">MIDNIGHT&nbsp;HIGHWAY&nbsp;RACER</p>
    </div>

    <div class="select-panel">
      <p class="panel-label">CHOOSE YOUR CAR</p>
      <canvas id="previewCanvas" width="180" height="220"></canvas>
      <div class="car-name" id="carNameLabel">CRIMSON RUSH</div>
      <div class="swatch-row" id="swatchRow"></div>
      <button class="btn" id="startBtn">▶ START RACE</button>
      <p class="hint" id="menuHint">Arrow keys / A·D to steer  ·  or use the on-screen arrows</p>
    </div>
  </div>

  <!-- ============ GAME ============ -->
  <div id="gameScreen" class="screen hidden">
    <div id="gameStage">
      <canvas id="gameCanvas"></canvas>

      <div class="hud">
        <div class="hud-block">
          <div class="hud-label">SCORE</div>
          <div class="hud-value" id="scoreVal">0</div>
        </div>
        <div class="hud-block" style="text-align:center">
          <div class="hud-label">SPEED</div>
          <div class="hud-value speed" id="speedVal">0<span style="font-size:.6rem">km/h</span></div>
        </div>
        <div class="hud-block" style="text-align:right">
          <div class="hud-label">BEST</div>
          <div class="hud-value" id="bestVal">0</div>
          <div class="lives" id="livesRow"></div>
        </div>
      </div>

      <div class="controls-top">
        <button class="icon-btn" id="pauseBtn" title="Pause">❚❚</button>
        <button class="icon-btn" id="stopBtn" title="Stop">■</button>
      </div>

      <div class="touch-controls">
        <button class="touch-btn" id="leftBtn">‹</button>
        <button class="touch-btn" id="rightBtn">›</button>
      </div>

      <!-- Pause overlay -->
      <div class="center-overlay hidden" id="pauseOverlay">
        <h2 class="overlay-title pause">PAUSED</h2>
        <p class="overlay-sub">Take a breath. The highway will wait.</p>
        <div class="overlay-buttons">
          <button class="btn" id="resumeBtn">▶ RESUME</button>
          <button class="btn secondary" id="menuFromPauseBtn">MAIN MENU</button>
        </div>
      </div>

      <!-- Game Over overlay -->
      <div class="center-overlay hidden" id="gameOverOverlay">
        <h2 class="overlay-title go">WRECKED!</h2>
        <p class="overlay-score">SCORE&nbsp; <b id="finalScore">0</b></p>
        <p class="overlay-sub" id="newBestMsg">&nbsp;</p>
        <div class="overlay-buttons">
          <button class="btn pink" id="retryBtn">↻ RACE AGAIN</button>
          <button class="btn secondary" id="menuFromGOBtn">MAIN MENU</button>
        </div>
      </div>

      <!-- Get ready overlay -->
      <div class="center-overlay hidden" id="readyOverlay">
        <h2 class="overlay-title pause" id="readyText">READY?</h2>
        <p class="overlay-sub">Dodge traffic. Grab coins. Survive the drift.</p>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ===================== CONFIG ===================== */
  const CAR_COLORS = [
    { name:"CRIMSON RUSH",  hex:"#ff3b3b", accent:"#ffb3b3" },
    { name:"CYAN VOLT",     hex:"#00e5ff", accent:"#c8faff" },
    { name:"SOLAR YELLOW",  hex:"#ffcc00", accent:"#fff2b0" },
    { name:"TOXIC GREEN",   hex:"#39ff88", accent:"#c6ffe0" },
    { name:"VIOLET NOVA",   hex:"#b23bff", accent:"#e6c8ff" },
    { name:"CHROME WHITE",  hex:"#f2f4ff", accent:"#ffffff" }
  ];
  const ENEMY_COLORS = ["#5b5f7a","#7a3030","#30407a","#4a4a4a"];
  const LANES = 3;
  const BASE_SPEED = 220;      // px/sec, scroll speed
  const MAX_SPEED  = 620;
  const SPEED_RAMP = 5.2;      // px/sec^2 acceleration of scroll speed
  const LIVES_START = 3;

  let selectedColorIdx = 0;
  let bestScore = 0;

  /* ===================== DOM ===================== */
  const menuScreen   = document.getElementById('menuScreen');
  const gameScreen    = document.getElementById('gameScreen');
  const previewCanvas = document.getElementById('previewCanvas');
  const pctx = previewCanvas.getContext('2d');
  const swatchRow = document.getElementById('swatchRow');
  const carNameLabel = document.getElementById('carNameLabel');
  const startBtn = document.getElementById('startBtn');

  const gameCanvas = document.getElementById('gameCanvas');
  const gctx = gameCanvas.getContext('2d');
  const gameStage = document.getElementById('gameStage');

  const scoreVal = document.getElementById('scoreVal');
  const speedVal = document.getElementById('speedVal');
  const bestVal  = document.getElementById('bestVal');
  const livesRow = document.getElementById('livesRow');

  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn  = document.getElementById('stopBtn');
  const leftBtn  = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');

  const pauseOverlay    = document.getElementById('pauseOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const readyOverlay    = document.getElementById('readyOverlay');
  const resumeBtn = document.getElementById('resumeBtn');
  const menuFromPauseBtn = document.getElementById('menuFromPauseBtn');
  const retryBtn = document.getElementById('retryBtn');
  const menuFromGOBtn = document.getElementById('menuFromGOBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const newBestMsg = document.getElementById('newBestMsg');
  const readyText = document.getElementById('readyText');

  /* ===================== CAR DRAWING ===================== */
  function drawCarShape(ctx, x, y, w, h, color, accent){
    ctx.save();
    ctx.translate(x,y);
    const r = w*0.22;
    // shadow
    ctx.fillStyle = "rgba(0,0,0,.35)";
    roundRect(ctx, -w/2+4, -h/2+8, w, h, r);
    ctx.fill();
    // body
    const grad = ctx.createLinearGradient(0,-h/2,0,h/2);
    grad.addColorStop(0, shade(color, 25));
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, shade(color,-25));
    ctx.fillStyle = grad;
    roundRect(ctx, -w/2, -h/2, w, h, r);
    ctx.fill();
    // windshield
    ctx.fillStyle = "rgba(15,20,35,.85)";
    roundRect(ctx, -w*0.32, -h*0.30, w*0.64, h*0.28, w*0.12);
    ctx.fill();
    // rear window
    ctx.fillStyle = "rgba(15,20,35,.7)";
    roundRect(ctx, -w*0.30, h*0.10, w*0.6, h*0.2, w*0.1);
    ctx.fill();
    // racing stripe
    ctx.fillStyle = accent;
    ctx.fillRect(-w*0.06, -h/2+2, w*0.12, h-4);
    // headlights
    ctx.fillStyle = "#fff9d6";
    ctx.fillRect(-w*0.42, -h/2+4, w*0.14, h*0.07);
    ctx.fillRect(w*0.28, -h/2+4, w*0.14, h*0.07);
    // taillights
    ctx.fillStyle = "#ff5050";
    ctx.fillRect(-w*0.42, h/2-h*0.10, w*0.14, h*0.06);
    ctx.fillRect(w*0.28, h/2-h*0.10, w*0.14, h*0.06);
    // wheels hint
    ctx.fillStyle = "#0b0b12";
    ctx.fillRect(-w/2-3, -h*0.30, 5, h*0.22);
    ctx.fillRect(w/2-2, -h*0.30, 5, h*0.22);
    ctx.fillRect(-w/2-3, h*0.08, 5, h*0.22);
    ctx.fillRect(w/2-2, h*0.08, 5, h*0.22);
    ctx.restore();
  }
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function shade(hex, percent){
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+Math.round(255*percent/100);
    let g=(n>>8 & 0xff)+Math.round(255*percent/100);
    let b=(n & 0xff)+Math.round(255*percent/100);
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return `rgb(${r},${g},${b})`;
  }

  /* ===================== MENU SETUP ===================== */
  function renderPreview(){
    pctx.clearRect(0,0,previewCanvas.width, previewCanvas.height);
    const c = CAR_COLORS[selectedColorIdx];
    drawCarShape(pctx, previewCanvas.width/2, previewCanvas.height/2, 78, 150, c.hex, c.accent);
    carNameLabel.textContent = c.name;
  }
  function buildSwatches(){
    CAR_COLORS.forEach((c, i)=>{
      const el = document.createElement('div');
      el.className = 'swatch' + (i===selectedColorIdx ? ' active':'');
      el.style.background = c.hex;
      el.style.color = c.hex;
      el.title = c.name;
      el.addEventListener('click', ()=>{
        selectedColorIdx = i;
        [...swatchRow.children].forEach(ch=>ch.classList.remove('active'));
        el.classList.add('active');
        renderPreview();
      });
      swatchRow.appendChild(el);
    });
  }
  buildSwatches();
  renderPreview();

  /* ===================== GAME STATE ===================== */
  let state = 'MENU'; // MENU | READY | PLAYING | PAUSED | GAMEOVER
  let stageW=0, stageH=0, laneW=0, roadX=0, roadW=0;
  let player, enemies, coins, particles, floatTexts;
  let scrollSpeed, distance, score, lives, spawnTimerEnemy, spawnTimerCoin, roadStripeOffset;
  let lastTime=0, rafId=null, shake=0;
  let keys = {left:false,right:false};

  function sizeStage(){
    const rect = gameStage.getBoundingClientRect();
    stageW = rect.width; stageH = rect.height;
    gameCanvas.width = stageW; gameCanvas.height = stageH;
    roadW = Math.min(stageW*0.86, 420);
    roadX = (stageW-roadW)/2;
    laneW = roadW/LANES;
  }

  function laneCenterX(laneIdx){ return roadX + laneW*laneIdx + laneW/2; }

  function resetGame(){
    sizeStage();
    player = {
      lane: 1, x: laneCenterX(1), targetX: laneCenterX(1),
      y: stageH-150, w: 46, h: 84, invuln:0
    };
    enemies = [];
    coins = [];
    particles = [];
    floatTexts = [];
    scrollSpeed = BASE_SPEED;
    distance = 0;
    score = 0;
    lives = LIVES_START;
    spawnTimerEnemy = 1.1;
    spawnTimerCoin = 0.7;
    roadStripeOffset = 0;
    shake = 0;
    updateHUD();
    renderLives();
  }

  function updateHUD(){
    scoreVal.textContent = Math.floor(score);
    speedVal.innerHTML = Math.floor(scrollSpeed*0.6) + '<span style="font-size:.6rem">km/h</span>';
    bestVal.textContent = bestScore;
  }
  function renderLives(){
    livesRow.innerHTML = '';
    for(let i=0;i<LIVES_START;i++){
      const d = document.createElement('div');
      d.className = 'life-dot' + (i>=lives ? ' lost' : '');
      livesRow.appendChild(d);
    }
  }

  /* ===================== SPAWNING ===================== */
  function spawnEnemy(){
    const lane = Math.floor(Math.random()*LANES);
    const color = ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)];
    enemies.push({ lane, x: laneCenterX(lane), y: -120, w:44, h:80, color, passed:false });
  }
  function spawnCoin(){
    const lane = Math.floor(Math.random()*LANES);
    coins.push({ lane, x: laneCenterX(lane), y:-60, r:14, spin:0, collected:false });
  }

  /* ===================== INPUT ===================== */
  function moveLeft(){ if(state!=='PLAYING') return; player.lane = Math.max(0, player.lane-1); player.targetX = laneCenterX(player.lane); }
  function moveRight(){ if(state!=='PLAYING') return; player.lane = Math.min(LANES-1, player.lane+1); player.targetX = laneCenterX(player.lane); }

  window.addEventListener('keydown', (e)=>{
    if(['ArrowLeft','a','A'].includes(e.key)) moveLeft();
    if(['ArrowRight','d','D'].includes(e.key)) moveRight();
    if(e.key===' ' || e.key==='Escape'){ togglePause(); }
  });
  leftBtn.addEventListener('click', moveLeft);
  rightBtn.addEventListener('click', moveRight);
  leftBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); moveLeft(); }, {passive:false});
  rightBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); moveRight(); }, {passive:false});

  /* swipe support on stage */
  let touchStartX = null;
  gameStage.addEventListener('touchstart', (e)=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
  gameStage.addEventListener('touchend', (e)=>{
    if(touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx)>30){ dx<0 ? moveLeft() : moveRight(); }
    touchStartX = null;
  }, {passive:true});

  /* ===================== FLOW CONTROL ===================== */
  startBtn.addEventListener('click', ()=>{
    menuScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    resetGame();
    enterReady();
  });

  function enterReady(){
    state='READY';
    readyText.textContent='READY?';
    readyOverlay.classList.remove('hidden');
    let n=3;
    const iv = setInterval(()=>{
      readyText.textContent = n>0 ? String(n) : 'GO!';
      n--;
      if(n<-1){
        clearInterval(iv);
        readyOverlay.classList.add('hidden');
        state='PLAYING';
        lastTime=performance.now();
        rafId = requestAnimationFrame(loop);
      }
    }, 550);
  }

  function togglePause(){
    if(state==='PLAYING'){
      state='PAUSED';
      pauseOverlay.classList.remove('hidden');
      cancelAnimationFrame(rafId);
    } else if(state==='PAUSED'){
      resumeGame();
    }
  }
  function resumeGame(){
    pauseOverlay.classList.add('hidden');
    state='PLAYING';
    lastTime=performance.now();
    rafId=requestAnimationFrame(loop);
  }
  pauseBtn.addEventListener('click', togglePause);
  resumeBtn.addEventListener('click', resumeGame);

  function stopToMenu(){
    cancelAnimationFrame(rafId);
    state='MENU';
    pauseOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    readyOverlay.classList.add('hidden');
    gameScreen.classList.add('hidden');
    menuScreen.classList.remove('hidden');
  }
  stopBtn.addEventListener('click', stopToMenu);
  menuFromPauseBtn.addEventListener('click', stopToMenu);
  menuFromGOBtn.addEventListener('click', stopToMenu);

  retryBtn.addEventListener('click', ()=>{
    gameOverOverlay.classList.add('hidden');
    resetGame();
    enterReady();
  });

  function gameOver(){
    state='GAMEOVER';
    cancelAnimationFrame(rafId);
    if(score>bestScore){ bestScore=Math.floor(score); newBestMsg.textContent='NEW BEST SCORE!'; }
    else { newBestMsg.textContent=''; }
    finalScoreEl.textContent = Math.floor(score);
    updateHUD();
    gameOverOverlay.classList.remove('hidden');
  }

  /* ===================== MAIN LOOP ===================== */
  function loop(ts){
    const dt = Math.min(0.04, (ts-lastTime)/1000);
    lastTime = ts;
    update(dt);
    draw();
    if(state==='PLAYING') rafId = requestAnimationFrame(loop);
  }

  function update(dt){
    scrollSpeed = Math.min(MAX_SPEED, scrollSpeed + SPEED_RAMP*dt);
    distance += scrollSpeed*dt;
    score += dt*10 + dt*(scrollSpeed*0.02);

    // player lane easing
    player.x += (player.targetX - player.x) * Math.min(1, dt*10);
    if(player.invuln>0) player.invuln -= dt;

    // road stripes
    roadStripeOffset = (roadStripeOffset + scrollSpeed*dt) % 60;

    // spawn timers scale with speed
    spawnTimerEnemy -= dt;
    const enemyInterval = Math.max(0.55, 1.3 - scrollSpeed/1000);
    if(spawnTimerEnemy<=0){ spawnEnemy(); spawnTimerEnemy = enemyInterval + Math.random()*0.4; }

    spawnTimerCoin -= dt;
    if(spawnTimerCoin<=0){ spawnCoin(); spawnTimerCoin = 0.9 + Math.random()*0.9; }

    // move enemies
    for(const e of enemies){ e.y += scrollSpeed*dt; }
    enemies = enemies.filter(e=> e.y < stageH+150);

    // move coins
    for(const c of coins){ c.y += scrollSpeed*dt; c.spin += dt*6; }
    coins = coins.filter(c=> c.y < stageH+80 && !c.collected);

    // collisions: enemy
    if(player.invuln<=0){
      for(const e of enemies){
        if(e.hit) continue;
        if(rectHit(player, e)){
          e.hit = true;
          lives -= 1;
          player.invuln = 1.4;
          shake = 12;
          renderLives();
          if(lives<=0){ gameOver(); return; }
        }
      }
    }

    // collisions: coin
    for(const c of coins){
      if(c.collected) continue;
      const dx = c.x-player.x, dy=c.y-(player.y+player.h*0.1);
      if(Math.hypot(dx,dy) < c.r+player.w*0.4){
        c.collected = true;
        score += 25;
        floatTexts.push({x:c.x,y:c.y,life:0.7,text:'+25'});
        spawnBurst(c.x,c.y);
      }
    }

    // particles
    for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.vy+=200*dt; }
    particles = particles.filter(p=>p.life>0);
    for(const f of floatTexts){ f.life-=dt; f.y-=dt*40; }
    floatTexts = floatTexts.filter(f=>f.life>0);

    if(shake>0) shake = Math.max(0, shake-dt*40);

    updateHUD();
  }

  function rectHit(p,e){
    return Math.abs(p.x-e.x) < (p.w+e.w)/2*0.78 && Math.abs((p.y+p.h/2)-(e.y+e.h/2)) < (p.h+e.h)/2*0.7;
  }
  function spawnBurst(x,y){
    for(let i=0;i<10;i++){
      const ang = Math.random()*Math.PI*2;
      const spd = 60+Math.random()*90;
      particles.push({x,y,vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd - 40, life:0.5+Math.random()*0.3, color:'#ffcc00'});
    }
  }

  /* ===================== DRAW ===================== */
  function draw(){
    gctx.save();
    if(shake>0){
      gctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    // background
    gctx.fillStyle = '#0e0f22';
    gctx.fillRect(-20,-20,stageW+40,stageH+40);

    // side grass/sand with glow strips
    const grad = gctx.createLinearGradient(0,0,0,stageH);
    grad.addColorStop(0,'#160f33'); grad.addColorStop(1,'#0c0a20');
    gctx.fillStyle = grad;
    gctx.fillRect(0,0,stageW,stageH);

    // road
    gctx.fillStyle = '#14152b';
    gctx.fillRect(roadX,0,roadW,stageH);

    // edge glow lines
    gctx.fillStyle = 'rgba(0,229,255,.55)';
    gctx.fillRect(roadX-3,0,3,stageH);
    gctx.fillRect(roadX+roadW,0,3,stageH);

    // lane dashes
    gctx.strokeStyle = 'rgba(150,160,220,.5)';
    gctx.lineWidth = 4;
    gctx.setLineDash([26,22]);
    for(let l=1;l<LANES;l++){
      const x = roadX + laneW*l;
      gctx.beginPath();
      gctx.lineDashOffset = -roadStripeOffset;
      gctx.moveTo(x,0); gctx.lineTo(x,stageH);
      gctx.stroke();
    }
    gctx.setLineDash([]);

    // coins
    for(const c of coins){
      const scaleX = Math.abs(Math.cos(c.spin));
      gctx.save();
      gctx.translate(c.x,c.y);
      gctx.scale(scaleX,1);
      const g = gctx.createRadialGradient(0,0,1,0,0,c.r);
      g.addColorStop(0,'#fff6cc'); g.addColorStop(0.5,'#ffcc00'); g.addColorStop(1,'#b88400');
      gctx.fillStyle = g;
      gctx.beginPath(); gctx.arc(0,0,c.r,0,Math.PI*2); gctx.fill();
      gctx.restore();
    }

    // enemies
    for(const e of enemies){
      drawCarShape(gctx, e.x, e.y, e.w, e.h, e.color, '#20222f');
    }

    // player (blink if invulnerable)
    if(!(player.invuln>0 && Math.floor(player.invuln*12)%2===0)){
      const c = CAR_COLORS[selectedColorIdx];
      drawCarShape(gctx, player.x, player.y, player.w, player.h, c.hex, c.accent);
    }

    // particles
    for(const p of particles){
      gctx.globalAlpha = Math.max(0,p.life*2);
      gctx.fillStyle = p.color;
      gctx.fillRect(p.x-2,p.y-2,4,4);
      gctx.globalAlpha = 1;
    }

    // float texts
    gctx.font = '700 16px Orbitron, sans-serif';
    gctx.textAlign='center';
    for(const f of floatTexts){
      gctx.globalAlpha = Math.max(0,f.life/0.7);
      gctx.fillStyle = '#ffcc00';
      gctx.fillText(f.text, f.x, f.y);
      gctx.globalAlpha = 1;
    }

    // speed streak vignette at high speed
    if(scrollSpeed > BASE_SPEED*1.6){
      gctx.globalAlpha = Math.min(0.35, (scrollSpeed-BASE_SPEED*1.6)/500);
      gctx.strokeStyle = '#00e5ff';
      gctx.lineWidth = 2;
      for(let i=0;i<6;i++){
        const yy = (roadStripeOffset*3 + i*140) % (stageH+140) - 70;
        gctx.beginPath();
        gctx.moveTo(roadX-10, yy); gctx.lineTo(roadX-30, yy+60);
        gctx.moveTo(roadX+roadW+10, yy); gctx.lineTo(roadX+roadW+30, yy+60);
        gctx.stroke();
      }
      gctx.globalAlpha = 1;
    }

    gctx.restore();
  }

  /* ===================== RESIZE ===================== */
  window.addEventListener('resize', ()=>{
    if(state==='PLAYING' || state==='PAUSED'){
      const oldLane = player ? player.lane : 1;
      sizeStage();
      player.x = laneCenterX(oldLane);
      player.targetX = player.x;
      player.y = stageH-150;
    }
  });

})();
</script>
</body>
