<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afzal AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="styleai.css">
</head>

<body>

<div id="particles"></div>

<!-- APP -->
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="logo">
<i class="fa-solid fa-robot"></i>
<span>Afzal AI</span>
</div>

<button class="new-chat">
<i class="fa-solid fa-plus"></i> New Chat
</button>

<button class="theme-toggle">
<i class="fa-solid fa-moon"></i>
</button>

<div class="history">
<h4>History</h4>
<div class="item">Portfolio Help</div>
<div class="item">JS Tips</div>
<div class="item">UI Ideas</div>
</div>

</aside>

<!-- MAIN -->
<main class="main">

<!-- NAVBAR -->
<header class="navbar">
<span>AI Assistant Dashboard</span>
</header>

<!-- WELCOME -->
<section class="welcome">
<div class="avatar">
<i class="fa-solid fa-robot"></i>

</div>

<h1>Ask Anything</h1>
<p>Your smart AI assistant</p>

<div class="suggestions">
<button>HTML</button>
<button>CSS</button>
<button>JavaScript</button>
<button>Portfolio</button>
</div>
</section>

<!-- CHAT -->
<div class="chat-box" id="chatBox"></div>

<!-- INPUT -->
<div class="input-area">
<input id="userInput" placeholder="Ask something..." />
<button id="sendBtn">
<i class="fa-solid fa-paper-plane"></i>
</button>
</div>

<!-- FOOTER -->
<footer>
Made with ❤️ by Afzal
</footer>

</main>

</div>

<script src="scriptai.js"></script>
</body>
</html>
