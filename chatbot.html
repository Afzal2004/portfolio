<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Afzal AI — Interactive portfolio chatbot by Mohammed Afzal">
    <title>Afzal AI Chatbot | Mohammed Afzal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>
<div id="particles"></div>

<div class="top-bar">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
    <div class="top-actions">
        <button class="icon-btn theme-btn" type="button" aria-label="Theme"><i class="fa-solid fa-moon"></i></button>
    </div>
</div>

<div class="app">
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-robot"></i> Afzal AI</div>
        <button class="new-chat" type="button"><i class="fa-solid fa-plus"></i> New chat</button>
        <p class="history-title">Recent chats</p>
        <div class="history-list" id="historyList"></div>
    </aside>

    <main class="main">
        <div class="chat-box" id="chatBox">
            <section class="welcome" id="welcome">
                <div class="welcome-avatar"><i class="fa-solid fa-robot"></i></div>
                <h1>How can I help?</h1>
                <p>Ask about Mohammed's skills, projects, experience, or contact info.</p>
                <div class="suggestions">
                    <button type="button">What are your skills?</button>
                    <button type="button">Tell me about ResumeAI</button>
                    <button type="button">How to contact you?</button>
                    <button type="button">Your experience</button>
                </div>
            </section>
        </div>
        <div class="input-area">
            <input id="userInput" type="text" placeholder="Type a message..." autocomplete="off">
            <button class="send-btn" id="sendBtn" type="button" aria-label="Send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script src="chatbot.js"></script>
</body>
</html>
